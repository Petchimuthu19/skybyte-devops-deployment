name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python
        run: flake8 app/ --exclude=migrations,__pycache__ --max-line-length=88

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          helm-version: 'v3.14.0'

      - name: Helm lint
        run: helm lint helm/skybyte-app 

      - name: Setup kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > kubeconfig

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'
     
      - name: Terraform Init
        env:
          TF_VAR_api_token: ${{ secrets.API_TOKEN }}
          TF_VAR_k8s_host: ${{ secrets.K8S_HOST }}
          TF_VAR_k8_ca_cert: ${{ secrets.K8_CA_CERT }}
          TF_VAR_k8s_token: ${{ secrets.K8S_TOKEN }}
        run: |
          cd terraform
          terraform init
     
      - name: Terraform validate
        env:
          TF_VAR_api_token: ${{ secrets.API_TOKEN}}
          TF_VAR_k8s_host: ${{ secrets.K8S_HOST }}
          TF_VAR_k8_ca_cert: ${{ secrets.K8_CA_CERT }}
          TF_VAR_k8s_token: ${{ secrets.K8S_TOKEN }}
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

      - name: Terraform Plan
        env:
          TF_VAR_api_token: ${{ secrets.API_TOKEN }}
          TF_VAR_k8s_host: ${{ secrets.K8S_HOST }}
          TF_VAR_k8_ca_cert: ${{ secrets.K8_CA_CERT }}
          TF_VAR_k8s_token: ${{ secrets.K8S_TOKEN }}
        run: |
          cd terraform
          terraform plan

      - name: Terraform Apply
        env:
          TF_VAR_api_token: ${{ secrets.API_TOKEN }}
          TF_VAR_k8s_host: ${{ secrets.K8S_HOST }}
          TF_VAR_k8_ca_cert: ${{ secrets.K8_CA_CERT }}
          TF_VAR_k8s_token: ${{ secrets.K8S_TOKEN }}
        run: |
          cd terraform
          terraform apply -auto-approve

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t petchimuthu1995/skybyte-app:${{ github.sha }} .
          docker push petchimuthu1995/skybyte-app:${{ github.sha }}

      - name: Deploy Application
        run: |
          helm upgrade --install skybyte-app helm/skybyte-app \
            --namespace devops-challenge \
            --create-namespace \
            --set image.repository=petchimuthu1995/skybyte-app \
            --set image.tag=${{ github.sha }} 
